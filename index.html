<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta id="metaDescription" name="description" content="">
<title id="pageTitle"></title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #1c2128;
    --border: #30363d;
    --border-muted: #21262d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-subtle: #6e7681;
    --accent-green: #238636;
    --accent-green-hover: #2ea043;
    --accent-blue: #58a6ff;
    --accent-purple: #a371f7;
    --accent-red: #f85149;
    --accent-yellow: #d29922;
    --accent-orange: #db6d28;
    --merged: #a371f7;
    --open: #238636;
    --featured: #d29922;
    --shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    --radius: 6px;
    --radius-lg: 12px;
    --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  [data-theme="light"] {
    --bg: #ffffff;
    --surface: #f6f8fa;
    --surface-2: #eaeef2;
    --border: #d0d7de;
    --border-muted: #d8dee4;
    --text: #1f2328;
    --text-muted: #59636e;
    --text-subtle: #818b98;
    --accent-green: #1f883d;
    --accent-green-hover: #1a7f37;
    --accent-blue: #0969da;
    --accent-purple: #8250df;
    --accent-red: #cf222e;
    --accent-yellow: #9a6700;
    --accent-orange: #bc4c00;
    --merged: #8250df;
    --open: #1f883d;
    --featured: #9a6700;
    --shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font-sans);
    background-color: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  /* ============ NAVIGATION ============ */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background-color: rgba(13, 17, 23, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-muted);
  }

  [data-theme="light"] .nav {
    background-color: rgba(255, 255, 255, 0.85);
  }

  .nav-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    text-decoration: none;
  }

  .nav-brand svg {
    flex-shrink: 0;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .nav-link {
    color: var(--text-muted);
    text-decoration: none;
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    transition: color 0.15s ease, background-color 0.15s ease;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
  }

  .nav-link:hover {
    color: var(--text);
    background-color: var(--surface);
  }

  .theme-toggle {
    background-color: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 44px;
    height: 44px;
    border-radius: var(--radius);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.15s ease, border-color 0.15s ease;
  }

  .theme-toggle:hover {
    background-color: var(--surface-2);
    border-color: var(--text-subtle);
  }

  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }
  [data-theme="light"] .theme-toggle .icon-sun { display: block; }
  [data-theme="light"] .theme-toggle .icon-moon { display: none; }

  /* ============ MAIN LAYOUT ============ */
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 20px;
  }

  section {
    padding: 64px 0;
    scroll-margin-top: 80px;
  }

  /* ============ HERO SECTION ============ */
  .hero {
    padding-top: 48px;
  }

  .hero-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 32px;
    align-items: start;
  }

  .hero-avatar {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: block;
    overflow: hidden;
    background-color: var(--surface);
  }

  .hero-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .readme-card {
    background-color: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .readme-header {
    background-color: var(--surface-2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-muted);
  }

  .readme-header svg {
    flex-shrink: 0;
  }

  .readme-body {
    padding: 24px 28px;
  }

  .md-h1 {
    font-family: var(--font-sans);
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    color: var(--text);
    line-height: 1.2;
  }

  .md-h1::before {
    content: "# ";
    color: var(--accent-blue);
    font-family: var(--font-mono);
    font-weight: 400;
  }

  .md-subtitle {
    font-family: var(--font-mono);
    font-size: 16px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .md-h2 {
    font-size: 22px;
    font-weight: 600;
    margin-top: 8px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-muted);
    color: var(--text);
  }

  .md-h2::before {
    content: "## ";
    color: var(--accent-blue);
    font-family: var(--font-mono);
    font-weight: 400;
  }

  .md-bio {
    color: var(--text);
    font-size: 16px;
    margin-bottom: 20px;
  }

  .md-bio p + p {
    margin-top: 8px;
  }

  .topic-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }

  .topic-tag {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    background-color: rgba(56, 139, 253, 0.15);
    color: var(--accent-blue);
    border: 1px solid rgba(56, 139, 253, 0.3);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font-mono);
    transition: background-color 0.15s ease;
  }

  .topic-tag:hover {
    background-color: rgba(56, 139, 253, 0.25);
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background-color: var(--accent-green);
    color: #ffffff;
    border: 1px solid rgba(240, 246, 252, 0.1);
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    min-height: 44px;
    transition: background-color 0.15s ease, transform 0.1s ease;
  }

  .btn-primary:hover {
    background-color: var(--accent-green-hover);
  }

  .btn-primary:active {
    transform: translateY(1px);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background-color: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    min-height: 44px;
    transition: background-color 0.15s ease, border-color 0.15s ease;
    font-family: inherit;
  }

  .btn-secondary:hover {
    background-color: var(--surface);
    border-color: var(--text-subtle);
  }

  /* ============ PROJECTS / PR SECTION ============ */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-muted);
  }

  .section-header h2 {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
  }

  .section-header .count-badge {
    font-family: var(--font-mono);
    font-size: 12px;
    background-color: var(--surface-2);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    margin-left: auto;
  }

  .pr-list {
    display: flex;
    flex-direction: column;
    background-color: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .pr-row {
    border-bottom: 1px solid var(--border-muted);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .pr-row:last-child {
    border-bottom: none;
  }

  .pr-row.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  .pr-summary {
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    color: inherit;
    font-family: inherit;
    transition: background-color 0.15s ease;
    min-height: 44px;
  }

  .pr-summary:hover {
    background-color: var(--surface-2);
  }

  .pr-icon {
    flex-shrink: 0;
    margin-top: 2px;
    color: var(--accent-green);
  }

  .pr-icon.merged { color: var(--merged); }
  .pr-icon.featured { color: var(--featured); }

  .pr-main {
    flex: 1;
    min-width: 0;
  }

  .pr-title-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 6px;
  }

  .pr-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .pr-summary:hover .pr-title {
    color: var(--accent-blue);
  }

  .label {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--font-mono);
    text-transform: lowercase;
    border: 1px solid transparent;
  }

  .label-merged {
    background-color: rgba(163, 113, 247, 0.15);
    color: var(--merged);
    border-color: rgba(163, 113, 247, 0.4);
  }

  .label-open {
    background-color: rgba(35, 134, 54, 0.15);
    color: var(--open);
    border-color: rgba(35, 134, 54, 0.4);
  }

  .label-featured {
    background-color: rgba(210, 153, 34, 0.15);
    color: var(--featured);
    border-color: rgba(210, 153, 34, 0.4);
  }

  .pr-meta {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }

  .pr-meta span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .pr-meta .branch {
    background-color: var(--surface-2);
    padding: 1px 6px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .pr-description {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    margin-bottom: 6px;
  }

  .pr-toggle {
    flex-shrink: 0;
    color: var(--text-muted);
    transition: transform 0.2s ease;
  }

  .pr-row.is-expanded .pr-toggle {
    transform: rotate(180deg);
  }

  .pr-details {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    background-color: var(--bg);
    border-top: 0px solid var(--border-muted);
  }

  .pr-row.is-expanded .pr-details {
    max-height: 1200px;
    border-top-width: 1px;
  }

  .pr-details-inner {
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .pr-details-text h4 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
    font-family: var(--font-mono);
  }

  .pr-details-text p {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 16px;
  }

  .stack-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }

  .stack-item {
    font-family: var(--font-mono);
    font-size: 12px;
    background-color: var(--surface);
    color: var(--text);
    padding: 3px 8px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }

  .pr-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pr-preview {
    background-color: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    aspect-ratio: 16 / 10;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pr-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: left center;
    display: block;
  }

  /* ============ EXPERIENCE / EDUCATION SECTIONS ============ */
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .timeline-card {
    background-color: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }

  .timeline-card:hover {
    border-color: var(--text-subtle);
    transform: translateY(-1px);
  }

  .timeline-head {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px 16px;
    margin-bottom: 4px;
  }

  .timeline-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .timeline-title a {
    color: var(--accent-blue);
    text-decoration: none;
  }

  .timeline-title a:hover {
    text-decoration: underline;
  }

  .timeline-period {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    background-color: var(--surface-2);
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .timeline-sub {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 12px;
  }

  .timeline-sub a {
    color: var(--accent-blue);
    text-decoration: none;
  }

  .timeline-sub a:hover {
    text-decoration: underline;
  }

  .timeline-bullets {
    margin: 8px 0 0 0;
    padding-left: 18px;
    color: var(--text);
  }

  .timeline-bullets li {
    font-size: 14px;
    margin-bottom: 6px;
    line-height: 1.55;
  }

  .timeline-bullets li::marker {
    color: var(--accent-green);
  }

  .timeline-desc {
    font-size: 14px;
    color: var(--text);
    margin-top: 4px;
  }

  /* ============ CERTIFICATES SECTION ============ */
  .cert-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
  }

  .cert-card {
    background-color: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 12px;
    transition: border-color 0.15s ease, transform 0.15s ease, background-color 0.15s ease;
  }

  .cert-card:hover {
    border-color: var(--accent-yellow);
    background-color: var(--surface-2);
    transform: translateY(-2px);
  }

  .cert-badge {
    flex-shrink: 0;
    width: 96px;
    height: 96px;
    border-radius: var(--radius-lg);
    background-color: rgba(210, 153, 34, 0.10);
    color: var(--accent-yellow);
    border: 1px solid rgba(210, 153, 34, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .cert-badge img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 6px;
    display: block;
  }

  .cert-badge svg {
    width: 44px;
    height: 44px;
  }

  .cert-text {
    min-width: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .cert-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .cert-issuer {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .cert-actions {
    margin-top: auto;
    padding-top: 4px;
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .cert-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background-color: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    font-family: inherit;
    transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }

  .cert-link:hover {
    background-color: var(--bg);
    border-color: var(--accent-yellow);
    color: var(--accent-yellow);
  }

  .cert-link[aria-disabled="true"] {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ============ CONTACT SECTION ============ */
  .terminal-title {
    font-family: var(--font-mono);
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }

  .terminal-title .prompt {
    color: var(--accent-green);
  }

  .terminal-title .flag {
    color: var(--accent-blue);
  }

  .terminal-cursor {
    display: inline-block;
    width: 10px;
    height: 22px;
    background-color: var(--text);
    vertical-align: -3px;
    animation: blink 1s steps(2) infinite;
    margin-left: 4px;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .section-subtitle {
    color: var(--text-muted);
    margin-bottom: 32px;
    font-size: 15px;
  }

  .contact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .contact-card {
    background-color: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.15s ease, transform 0.15s ease, background-color 0.15s ease;
    min-height: 44px;
  }

  .contact-card:hover {
    border-color: var(--accent-blue);
    background-color: var(--surface-2);
    transform: translateY(-2px);
  }

  .contact-icon {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border-radius: var(--radius);
    background-color: var(--surface-2);
    color: var(--accent-blue);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
  }

  .contact-card:hover .contact-icon {
    background-color: var(--bg);
  }

  .contact-text {
    min-width: 0;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .contact-label {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .contact-value {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    word-break: break-word;
    overflow-wrap: break-word;
  }

  .download-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    padding: 20px;
    background-color: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }

  .download-text {
    flex: 1;
    min-width: 200px;
  }

  .download-text strong {
    display: block;
    font-size: 15px;
    margin-bottom: 2px;
  }

  .download-text span {
    font-size: 13px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  /* ============ FOOTER ============ */
  footer {
    border-top: 1px solid var(--border-muted);
    margin-top: 64px;
    padding: 32px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--font-mono);
  }

  footer p + p {
    margin-top: 6px;
    color: var(--text-subtle);
  }

  footer a {
    color: var(--accent-blue);
    text-decoration: none;
  }

  footer a:hover {
    text-decoration: underline;
  }

  /* ============ SCROLL REVEAL ============ */
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 768px) {
    .nav-link[data-mobile-hide] {
      display: none;
    }

    .nav-inner {
      padding: 10px 16px;
    }

    main {
      padding: 0 16px;
    }

    section {
      padding: 48px 0;
    }

    .hero {
      padding-top: 32px;
    }

    .hero-grid {
      grid-template-columns: 1fr;
      gap: 24px;
      justify-items: center;
      text-align: center;
    }

    .hero-avatar {
      width: 140px;
      height: 140px;
    }

    .readme-body {
      padding: 20px;
      text-align: left;
    }

    .md-h1 {
      font-size: 30px;
    }

    .md-h2 {
      font-size: 18px;
    }

    .md-bio {
      font-size: 15px;
    }

    .pr-summary {
      padding: 14px 16px;
    }

    .pr-title {
      font-size: 15px;
    }

    .pr-meta {
      font-size: 11px;
      gap: 8px;
    }

    .pr-details-inner {
      grid-template-columns: 1fr;
      padding: 20px 16px;
      gap: 20px;
    }

    .terminal-title {
      font-size: 20px;
    }

    .terminal-cursor {
      height: 18px;
    }

    .contact-grid {
      grid-template-columns: 1fr;
    }

    .download-row {
      flex-direction: column;
      align-items: stretch;
    }

    .download-row .btn-primary {
      justify-content: center;
    }
  }

  @media (max-width: 420px) {
    .md-h1 {
      font-size: 26px;
    }

    .nav-brand span:not(.brand-mark) {
      display: none;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
    html {
      scroll-behavior: auto;
    }
  }
</style>

    github: '<svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg>',
    location: '<svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="m12.596 11.596-3.535 3.536a1.5 1.5 0 0 1-2.122 0l-3.535-3.536a6.5 6.5 0 1 1 9.192-9.193 6.5 6.5 0 0 1 0 9.193Zm-1.06-8.132a5 5 0 1 0-7.072 7.072L8 14.07l3.536-3.534a5 5 0 0 0 0-7.072ZM8 9a2 2 0 1 1-.001-3.999A2 2 0 0 1 8 9Z"/></svg>',
    star: '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/></svg>'
  };

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function setText(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = value;
  }

  function setAttr(id, attr, value) {
    const el = document.getElementById(id);
    if (el) el.setAttribute(attr, value);
  }

  // ============ POPULATE STATIC TEXT ============
  function populateMeta() {
    document.title = CFG.meta.title;
    setText('pageTitle', CFG.meta.title);
    setAttr('metaDescription', 'content', CFG.meta.description);
  }

  function populateNav() {
    setText('brandText', CFG.nav.brand);
    setText('navAbout', CFG.nav.links.about);
    setText('navProjects', CFG.nav.links.projects);
    setText('navExperience', CFG.nav.links.experience);
    setText('navEducation', CFG.nav.links.education);
    setText('navCertificates', CFG.nav.links.certificates);
    setText('navContact', CFG.nav.links.contact);
  }

  function populateHero() {
    const avatar = document.getElementById('avatarImg');
    if (avatar) {
      avatar.src = CFG.hero.avatarUrl;
      avatar.alt = CFG.hero.avatarAlt;
    }
    setText('readmeFilename', CFG.hero.readmeFilename);
    setText('hero-heading', CFG.hero.name);
    setText('heroSubtitle', CFG.hero.subtitle);
    setText('aboutHeading', CFG.hero.aboutTitle);

    const bio = document.getElementById('bioContent');
    if (bio) {
      bio.innerHTML = CFG.hero.bio.map(p => `<p>${escapeHtml(p)}</p>`).join('');
    }

    const tags = document.getElementById('topicTags');
    if (tags) {
      tags.innerHTML = CFG.hero.topicTags
        .map(t => `<span class="topic-tag" role="listitem">${escapeHtml(t)}</span>`)
        .join('');
    }

    setText('heroCtaText', CFG.hero.ctaText);
  }

  function populateContact() {
    setText('terminalPrompt', CFG.contact.terminalPrompt);
    setText('terminalCommand', CFG.contact.terminalCommand);
    setText('terminalFlag', CFG.contact.terminalFlag);
    setText('contactSubtitle', CFG.contact.subtitle);
    setText('cvTitle', CFG.contact.cv.title);
    setText('cvFileMeta', CFG.contact.cv.fileMeta);
    setText('downloadCVText', CFG.contact.cv.buttonText);

    // Contact cards
    const grid = document.getElementById('contactGrid');
    if (grid) {
      const c = CFG.contact.cards;
      const card = (icon, item, asLink) => {
        const inner = `
          <span class="contact-icon" aria-hidden="true">${icon}</span>
          <span class="contact-text">
            <span class="contact-label">${escapeHtml(item.label)}</span>
            <span class="contact-value">${escapeHtml(item.value)}</span>
          </span>
        `;
        if (asLink) {
          const isExternal = /^https?:\/\//.test(item.href);
          const targetAttrs = isExternal ? 'target="_blank" rel="noopener noreferrer"' : '';
          return `<a class="contact-card" href="${escapeHtml(item.href)}" ${targetAttrs} aria-label="${escapeHtml(item.ariaLabel || item.label)}">${inner}</a>`;
        }
        return `<div class="contact-card" role="group" aria-label="${escapeHtml(item.label)}">${inner}</div>`;
      };

      grid.innerHTML = [
        c.email ? card(ICONS.email, c.email, true) : '',
        c.linkedin ? card(ICONS.linkedin, c.linkedin, true) : '',
        c.github ? card(ICONS.github, c.github, true) : '',
        c.location ? card(ICONS.location, c.location, false) : ''
      ].join('');
    }
  }

  function populateFooter() {
    setText('footerName', CFG.footer.copyrightName);
    setText('footerTagline', CFG.footer.copyrightTagline);
    setText('footerCommitPrefix', CFG.footer.lastCommitPrefix);
    setText('footerBackTop', CFG.footer.backToTopText);

    const yearEl = document.getElementById('year');
    if (yearEl) yearEl.textContent = String(new Date().getFullYear());

    const commitEl = document.getElementById('commitDate');
    if (commitEl) {
      const opts = { year: 'numeric', month: 'short', day: 'numeric' };
      commitEl.textContent = new Date().toLocaleDateString('en-US', opts);
    }
  }

  // ============ RENDER PR LIST ============
  function renderProjects() {
    const list = document.getElementById('prList');
    const heading = document.getElementById('projects-heading');
    if (heading) heading.textContent = CFG.projects.sectionTitle;
    if (!list) return;

    const items = CFG.projects.items;

    const html = items.map((p, idx) => {
      const iconClass = p.status === 'merged' ? 'merged' : (p.label === 'featured' ? 'featured' : '');
      const icon = p.status === 'merged' ? ICONS.merged : ICONS.open;
      const labelClass = `label-${p.label}`;
      const previewUrl = p.previewUrl || `https://picsum.photos/seed/${encodeURIComponent(p.previewSeed)}/640/400`;

      const stackHtml = p.stack.map(s => `<span class="stack-item">${escapeHtml(s)}</span>`).join('');

      return `
        <div class="pr-row" role="listitem" data-index="${idx}">
          <button class="pr-summary" type="button" aria-expanded="false" aria-controls="pr-details-${idx}">
            <span class="pr-icon ${iconClass}" aria-hidden="true">${icon}</span>
            <span class="pr-main">
              <span class="pr-title-row">
                <span class="pr-title">${escapeHtml(p.title)}</span>
                <span class="label ${labelClass}">${escapeHtml(p.label)}</span>
              </span>
              <span class="pr-description">${escapeHtml(p.description)}</span>
              <span class="pr-meta">
                <span>#${p.number}</span>
                <span>${escapeHtml(p.date)}</span>
                <span class="branch">${ICONS.branch} ${escapeHtml(p.branch)}</span>
                ${p.stars != null ? `<span>${ICONS.star} ${p.stars} stars</span>` : ''}
                ${p.commits != null ? `<span>${ICONS.commit} ${p.commits} ${escapeHtml(CFG.labels.commitsSuffix)}</span>` : ''}
                ${p.files != null ? `<span>${ICONS.file} ${p.files} ${escapeHtml(CFG.labels.filesSuffix)}</span>` : ''}
              </span>
            </span>
            <span class="pr-toggle" aria-hidden="true">${ICONS.chevron}</span>
          </button>
          <div class="pr-details" id="pr-details-${idx}" role="region" aria-label="${escapeHtml(p.title)} details">
            <div class="pr-details-inner">
              <div class="pr-details-text">
                <h4>${escapeHtml(CFG.labels.overview)}</h4>
                <p>${escapeHtml(p.longDescription)}</p>
                <h4>${escapeHtml(CFG.labels.techStack)}</h4>
                <div class="stack-list">${stackHtml}</div>
                <div class="pr-actions">
                  <a href="${escapeHtml(p.links.github)}" class="btn-secondary" target="_blank" rel="noopener noreferrer" aria-label="${escapeHtml(CFG.labels.viewSource)}">
                    ${ICONS.external} ${escapeHtml(CFG.labels.viewSource)}
                  </a>
                </div>
              </div>
              <div class="pr-preview">
                <img src="${previewUrl}" alt="${escapeHtml(p.title)} preview" width="640" height="400" loading="lazy">
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    list.innerHTML = html;

    // Counter
    const openCount = items.filter(p => p.status === 'open').length;
    const mergedCount = items.filter(p => p.status === 'merged').length;
    const counter = document.getElementById('prCount');
    if (counter) {
      counter.textContent = `${openCount} ${CFG.labels.openShort} · ${mergedCount} ${CFG.labels.mergedShort}`;
    }

    // Wire up expand/collapse
    list.querySelectorAll('.pr-summary').forEach(btn => {
      btn.addEventListener('click', () => {
        const row = btn.closest('.pr-row');
        const expanded = row.classList.toggle('is-expanded');
        btn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
      });
    });
  }

  // ============ RENDER EXPERIENCE ============
  function renderExperience() {
    const heading = document.getElementById('experience-heading');
    const list = document.getElementById('experienceList');
    const counter = document.getElementById('experienceCount');
    if (!CFG.experience || !list) return;

    if (heading) heading.textContent = CFG.experience.sectionTitle;

    const items = CFG.experience.items || [];
    if (counter) counter.textContent = `${items.length} role${items.length === 1 ? '' : 's'}`;

    list.innerHTML = items.map(it => {
      const subParts = [];
      if (it.location) subParts.push(escapeHtml(it.location));
      if (it.companyUrl) subParts.push(`<a href="${escapeHtml(it.companyUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(it.companyUrl.replace(/^https?:\/\//, '').replace(/\/$/, ''))}</a>`);
      if (it.linkedinUrl) subParts.push(`<a href="${escapeHtml(it.linkedinUrl)}" target="_blank" rel="noopener noreferrer">LinkedIn</a>`);

      const bullets = (it.bullets || []).map(b => `<li>${escapeHtml(b)}</li>`).join('');

      return `
        <article class="timeline-card">
          <div class="timeline-head">
            <div class="timeline-title">${escapeHtml(it.role)} · <span style="color: var(--text-muted); font-weight: 500;">${escapeHtml(it.company)}</span></div>
            <span class="timeline-period">${escapeHtml(it.period)}</span>
          </div>
          ${subParts.length ? `<div class="timeline-sub">${subParts.join('<span style="color: var(--text-subtle);">·</span>')}</div>` : ''}
          ${bullets ? `<ul class="timeline-bullets">${bullets}</ul>` : ''}
        </article>
      `;
    }).join('');
  }

  // ============ RENDER EDUCATION ============
  function renderEducation() {
    const heading = document.getElementById('education-heading');
    const list = document.getElementById('educationList');
    const counter = document.getElementById('educationCount');
    if (!CFG.education || !list) return;

    if (heading) heading.textContent = CFG.education.sectionTitle;

    const items = CFG.education.items || [];
    if (counter) counter.textContent = `${items.length} entr${items.length === 1 ? 'y' : 'ies'}`;

    list.innerHTML = items.map(it => {
      const subParts = [];
      if (it.degree) subParts.push(escapeHtml(it.degree));
      if (it.location) subParts.push(escapeHtml(it.location));

      return `
        <article class="timeline-card">
          <div class="timeline-head">
            <div class="timeline-title">${escapeHtml(it.institution)}</div>
            <span class="timeline-period">${escapeHtml(it.period)}</span>
          </div>
          ${subParts.length ? `<div class="timeline-sub">${subParts.join('<span style="color: var(--text-subtle);">·</span>')}</div>` : ''}
          ${it.description ? `<p class="timeline-desc">${escapeHtml(it.description)}</p>` : ''}
        </article>
      `;
    }).join('');
  }

  // ============ RENDER CERTIFICATES ============
  function renderCertificates() {
    const heading = document.getElementById('certificates-heading');
    const list = document.getElementById('certificatesList');
    const counter = document.getElementById('certificatesCount');
    if (!CFG.certificates || !list) return;

    if (heading) heading.textContent = CFG.certificates.sectionTitle;

    const items = CFG.certificates.items || [];
    if (counter) counter.textContent = `${items.length} earned`;

    const fallbackBadge = '<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M7.775.495a.75.75 0 0 1 .45 0l6.5 2A.75.75 0 0 1 15 3.5c-.025 6.625-1.474 9.825-6.74 12.426a.752.752 0 0 1-.521 0C2.474 13.325 1.025 10.125 1 3.5a.75.75 0 0 1 .275-1.005ZM2.516 4.064C2.65 9.555 3.892 12.02 8 14.07c4.108-2.05 5.35-4.515 5.484-10.006L8 2.034 2.516 4.064Z"/></svg>';
    const externalIcon = '<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M3.75 2h3.5a.75.75 0 0 1 0 1.5h-3.5a.25.25 0 0 0-.25.25v8.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25v-3.5a.75.75 0 0 1 1.5 0v3.5A1.75 1.75 0 0 1 12.25 14h-8.5A1.75 1.75 0 0 1 2 12.25v-8.5C2 2.784 2.784 2 3.75 2Zm6.854-1h4.146a.25.25 0 0 1 .25.25v4.146a.25.25 0 0 1-.427.177L13.03 4.03 9.28 7.78a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042l3.75-3.75-1.543-1.543A.25.25 0 0 1 10.604 1Z"/></svg>';
    const buttonText = CFG.certificates.viewButtonText || 'See certification';

    list.innerHTML = items.map(it => {
      const badge = it.badgeUrl
        ? `<img src="${escapeHtml(it.badgeUrl)}" alt="${escapeHtml(it.name)} badge" loading="lazy">`
        : fallbackBadge;

      const action = it.url
        ? `<a class="cert-link" href="${escapeHtml(it.url)}" target="_blank" rel="noopener noreferrer" aria-label="${escapeHtml(buttonText)}: ${escapeHtml(it.name)}">${externalIcon} ${escapeHtml(buttonText)}</a>`
        : `<span class="cert-link" aria-disabled="true" title="No link provided">${externalIcon} ${escapeHtml(buttonText)}</span>`;

      return `
        <div class="cert-card" role="listitem">
          <span class="cert-badge" aria-hidden="${it.badgeUrl ? 'false' : 'true'}">${badge}</span>
          <span class="cert-text">
            <span class="cert-name">${escapeHtml(it.name)}</span>
            <span class="cert-issuer">${escapeHtml(it.issuer)}${it.year ? ' · ' + escapeHtml(it.year) : ''}</span>
          </span>
          <div class="cert-actions">${action}</div>
        </div>
      `;
    }).join('');
  }

  // ============ THEME TOGGLE ============
  function setupThemeToggle() {
    const btn = document.getElementById('themeToggle');
    if (!btn) return;

    const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
    if (prefersLight) {
      document.documentElement.setAttribute('data-theme', 'light');
    }

    btn.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      btn.setAttribute('aria-label', `Switch to ${next === 'light' ? 'dark' : 'light'} theme`);
    });
  }

  // ============ SCROLL REVEAL ============
  function setupReveal() {
    const targets = document.querySelectorAll('.reveal, .pr-row');
    if (!('IntersectionObserver' in window) || !targets.length) {
      targets.forEach(el => el.classList.add('is-visible'));
      return;
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          if (entry.target.classList.contains('pr-row')) {
            const idx = parseInt(entry.target.dataset.index || '0', 10);
            setTimeout(() => entry.target.classList.add('is-visible'), idx * 60);
          } else {
            entry.target.classList.add('is-visible');
          }
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

    targets.forEach(el => observer.observe(el));
  }

  // ============ CV DOWNLOAD ============
  function setupCVDownload() {
    const btn = document.getElementById('downloadCV');
    if (!btn) return;

    btn.addEventListener('click', () => {
      const a = document.createElement('a');
      a.href = CFG.contact.cv.url;
      a.download = CFG.contact.cv.filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
  }

  // ============ INIT ============
  function init() {
    populateMeta();
    populateNav();
    populateHero();
    populateContact();
    populateFooter();
    renderProjects();
    renderExperience();
    renderEducation();
    renderCertificates();
    setupThemeToggle();
    setupReveal();
    setupCVDownload();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
